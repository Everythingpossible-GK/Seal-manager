<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Container Seal Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+Arabic:wght@400;700&display=swap');
        
        body {
            background-color: #f3f4f6;
            font-family: 'Inter', 'Noto+Sans+Arabic', sans-serif;
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .input-field {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            margin-top: 0.25rem;
            outline: none;
            transition: border-color 0.2s;
            font-size: 16px; /* Prevents iOS zoom on focus */
        }
        .input-field:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }
        
        .uppercase-input { text-transform: uppercase; }
        
        .btn {
            padding: 0.75rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 800;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            text-transform: uppercase;
            cursor: pointer;
        }
        
        .btn-primary { background-color: #2563eb; color: white; }
        .btn-danger { background-color: #ef4444; color: white; }
        .btn-success { background-color: #10b981; color: white; }
        .btn-info { background-color: #0ea5e9; color: white; }
        .btn-warning { background-color: #f59e0b; color: white; }
        .btn-teal { background-color: #0f766e; color: white; }
        
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        
        .table-container { max-height: 400px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .modal-overlay.active { display: flex; }
        
        #lockScreen { background: #0f172a; color: white; }
        .login-input {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            letter-spacing: 0.5em;
            font-weight: 900;
        }

        .photo-preview-container {
            width: 100%;
            height: 120px;
            background: #f9fafb;
            border: 2px dashed #e5e7eb;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .photo-preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Fixed scrollbar for some mobile browsers */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-6 flex justify-between items-start">
            <div class="text-left">
                <h1 class="text-3xl font-black text-gray-900 tracking-tighter italic uppercase">Seal <span class="text-blue-600">Manager</span></h1>
                <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest mt-1">Industrial Grade / v5.0</p>
            </div>
            <button onclick="lockApp()" class="btn btn-warning py-2 px-4 text-[10px]">
                <span>LOGOUT</span>
                <span>خروج</span>
            </button>
        </header>

        <!-- Configuration -->
        <div class="card p-5 mb-6 border border-gray-100">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 tracking-widest">Date / التاريخ</label>
                    <input type="date" id="recordDate" class="input-field">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 tracking-widest">Shift / الوردية</label>
                    <select id="shift" class="input-field font-bold">
                        <option value="SHIFT 1">SHIFT 1</option>
                        <option value="SHIFT 2">SHIFT 2</option>
                        <option value="SHIFT 3">SHIFT 3</option>
                        <option value="SHIFT 4">SHIFT 4</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 tracking-widest">Staff ID / رقم الموظف (Optional)</label>
                    <input type="text" id="staffId" class="input-field font-bold" placeholder="ID NO">
                </div>
            </div>
        </div>

        <!-- Inputs Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="card p-4 border-b-4 border-blue-500">
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 tracking-widest">Container No.</label>
                <input type="text" id="containerNo" class="input-field uppercase-input font-black text-lg" placeholder="MSCU1234567">
            </div>
            <div class="card p-4 border-b-4 border-gray-400">
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 tracking-widest">Old Seal</label>
                <input type="text" id="oldSeal" class="input-field uppercase-input font-mono text-lg" placeholder="OLD ID">
            </div>
            <div class="card p-4 border-b-4 border-green-500">
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 tracking-widest">New Seal</label>
                <input type="text" id="newSeal" class="input-field uppercase-input font-mono font-black text-blue-600 text-lg" placeholder="NEW ID">
            </div>
            <!-- Photo Attachment -->
            <div class="card p-4 border-b-4 border-amber-500 flex flex-col justify-between">
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 tracking-widest">Attachment / صورة (Optional)</label>
                <div id="photoContainer" class="photo-preview-container cursor-pointer" onclick="triggerCamera()">
                    <div id="photoPlaceholder" class="text-center p-2">
                        <svg class="w-8 h-8 mx-auto text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <span class="text-[9px] font-black text-gray-400 uppercase tracking-tighter">Tap for Camera</span>
                    </div>
                    <img id="photoPreview" class="photo-preview-img hidden" src="">
                    <button id="removePhotoBtn" onclick="removePhoto(event)" class="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full hidden">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="handlePhoto(event)">
            </div>
        </div>

        <!-- Actions -->
        <div class="card p-5 mb-6 bg-gray-50 border border-gray-200">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                <button onclick="addEntry()" class="btn btn-primary col-span-2 md:col-span-1 py-4">
                    <span>SAVE</span>
                    <span class="text-[9px] font-normal">حفظ</span>
                </button>
                <button onclick="exportToExcel()" id="exportBtn" class="btn btn-success py-4" disabled>
                    <span>EXCEL</span>
                    <span class="text-[9px] font-normal">إكسل</span>
                </button>
                <button onclick="printReport()" id="printBtn" class="btn btn-teal py-4" disabled>
                    <span>PRINT/PDF</span>
                    <span class="text-[9px] font-normal">طباعة</span>
                </button>
                <button onclick="handleShare()" id="shareBtn" class="btn btn-info py-4" disabled>
                    <span>SHARE</span>
                    <span class="text-[9px] font-normal">مشاركة</span>
                </button>
                <button onclick="confirmClearAll()" class="btn btn-danger py-4">
                    <span>WIPE</span>
                    <span class="text-[9px] font-normal">مسح</span>
                </button>
            </div>
        </div>

        <div id="statusMsg" class="hidden mb-4 p-3 rounded-lg text-center font-black text-[10px] uppercase shadow-sm"></div>

        <!-- Display -->
        <div class="card p-5 border border-gray-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-black text-gray-400 uppercase italic">Recent Records</h2>
                <span id="recordCount" class="bg-gray-100 text-gray-600 text-[10px] font-black px-3 py-1 rounded-full">0 RECORDS</span>
            </div>
            <div class="table-container">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 sticky top-0 z-10">
                        <tr>
                            <th class="p-3 border-b text-[9px] font-black text-gray-400 uppercase">Details</th>
                            <th class="p-3 border-b text-[9px] font-black text-gray-400 uppercase">Container</th>
                            <th class="p-3 border-b text-[9px] font-black text-gray-400 uppercase">Old Seal</th>
                            <th class="p-3 border-b text-[9px] font-black text-gray-400 uppercase">New Seal</th>
                        </tr>
                    </thead>
                    <tbody id="entriesTableBody" class="text-xs"></tbody>
                </table>
            </div>
            <div id="emptyState" class="text-center py-12 text-gray-300 font-bold uppercase tracking-widest text-xs">No records logged yet</div>
        </div>
    </div>

    <!-- Login screen -->
    <div id="lockScreen" class="modal-overlay active">
        <div class="text-center p-8 w-full max-w-xs">
            <div class="w-24 h-24 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-2xl rotate-3">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-4xl font-black mb-1 uppercase italic tracking-tighter">Login</h2>
            <p class="text-amber-500 text-[10px] font-black uppercase tracking-[0.4em] mb-10">Security PIN required</p>
            <input type="password" id="loginPass" class="input-field login-input mb-4 text-3xl py-5 rounded-2xl" placeholder="••••" maxlength="4" inputmode="numeric" onkeypress="if(event.key === 'Enter') handleLogin()">
            <button onclick="handleLogin()" class="btn btn-warning w-full py-6 font-black text-sm tracking-widest rounded-2xl shadow-xl">AUTHORIZE</button>
            <div id="loginError" class="text-red-500 text-[10px] font-black mt-6 hidden uppercase tracking-widest">Invalid Access Code</div>
        </div>
    </div>

    <!-- Confirm Clear -->
    <div id="clearModal" class="modal-overlay">
        <div class="bg-white p-8 rounded-3xl max-w-xs w-full text-center shadow-2xl border-4 border-red-500">
            <h3 class="text-2xl font-black mb-2 text-black uppercase italic">Wipe Data?</h3>
            <p class="text-gray-500 font-bold text-xs mb-8">This will permanently delete all records from this device.</p>
            <div class="flex gap-3">
                <button onclick="clearAllData()" class="flex-1 btn btn-danger py-4 text-xs">WIPE ALL</button>
                <button onclick="closeClearModal()" class="flex-1 btn bg-gray-200 text-gray-700 py-4 text-xs">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="photoModal" class="modal-overlay" onclick="closePhotoModal()">
        <div class="max-w-xl w-full p-4">
            <img id="modalImg" class="w-full h-auto rounded-2xl shadow-2xl" src="">
        </div>
    </div>

    <script>
        // --- High Capacity Database (IndexedDB) ---
        const DB_NAME = 'SealManagerDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'records';
        let db;

        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: 'Timestamp' });
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadData();
        };

        let entries = [];
        let currentPhotoData = null;

        function loadData() {
            if (!db) return;
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const request = store.getAll();
            request.onsuccess = () => {
                entries = request.result.sort((a, b) => b.Timestamp - a.Timestamp);
                updateUI();
            };
        }

        function saveRecordToDB(record) {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.add(record);
        }

        function clearAllRecordsFromDB() {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.clear();
        }

        // --- Auth Logic ---
        function lockApp() {
            document.getElementById('lockScreen').classList.add('active');
            localStorage.setItem('seal_app_locked', 'true');
        }

        function handleLogin() {
            if (document.getElementById('loginPass').value === '1234') {
                document.getElementById('lockScreen').classList.remove('active');
                localStorage.setItem('seal_app_locked', 'false');
            } else {
                document.getElementById('loginError').classList.remove('hidden');
                document.getElementById('loginPass').value = '';
                setTimeout(() => document.getElementById('loginError').classList.add('hidden'), 2000);
            }
        }

        // --- Photo Logic ---
        window.triggerCamera = () => document.getElementById('cameraInput').click();

        window.handlePhoto = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; // Optimal size for stability
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    currentPhotoData = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('photoPreview').src = currentPhotoData;
                    document.getElementById('photoPreview').classList.remove('hidden');
                    document.getElementById('photoPlaceholder').classList.add('hidden');
                    document.getElementById('removePhotoBtn').classList.remove('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.removePhoto = (e) => {
            if (e) e.stopPropagation();
            currentPhotoData = null;
            document.getElementById('photoPreview').classList.add('hidden');
            document.getElementById('photoPlaceholder').classList.remove('hidden');
            document.getElementById('removePhotoBtn').classList.add('hidden');
            document.getElementById('cameraInput').value = '';
        };

        window.viewPhoto = (data) => {
            document.getElementById('modalImg').src = data;
            document.getElementById('photoModal').classList.add('active');
        };

        window.closePhotoModal = () => document.getElementById('photoModal').classList.remove('active');

        // --- Core Functions ---
        window.addEntry = () => {
            const container = document.getElementById('containerNo').value.trim().toUpperCase();
            const oldS = document.getElementById('oldSeal').value.trim().toUpperCase();
            const newS = document.getElementById('newSeal').value.trim().toUpperCase();
            const staff = document.getElementById('staffId').value.trim() || "N/A";
            const date = document.getElementById('recordDate').value;
            const shift = document.getElementById('shift').value;

            if (!container || !oldS || !newS || !date) {
                showStatus('Incomplete Data', 'error');
                return;
            }

            const newEntry = { Date: date, Shift: shift, Staff_ID: staff, Container_No: container, Old_Seal: oldS, New_Seal: newS, Photo: currentPhotoData, Timestamp: Date.now() };
            
            try {
                saveRecordToDB(newEntry);
                entries.unshift(newEntry);
                updateUI();
                ['containerNo', 'oldSeal', 'newSeal'].forEach(id => document.getElementById(id).value = '');
                removePhoto();
                showStatus('Saved Successfully', 'success');
            } catch (err) {
                showStatus('Storage Full - Clear Data', 'error');
            }
        };

        function updateUI() {
            const tbody = document.getElementById('entriesTableBody');
            tbody.innerHTML = '';
            document.getElementById('recordCount').innerText = `${entries.length} RECORDS`;
            const hasData = entries.length > 0;
            ['exportBtn', 'shareBtn', 'printBtn'].forEach(id => document.getElementById(id).disabled = !hasData);
            document.getElementById('emptyState').classList.toggle('hidden', hasData);
            
            entries.forEach(e => {
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-gray-50 transition-colors";
                const photoIcon = e.Photo ? `<button onclick="viewPhoto('${e.Photo}')" class="ml-2 text-blue-500"><svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2-2v12a2 2 0 002 2z"></path></svg></button>` : '';
                tr.innerHTML = `<td class="p-3 text-gray-400"><span class="block font-black text-gray-800 tracking-tight">${e.Date}</span><span class="text-[9px] font-bold uppercase">${e.Shift}</span></td><td class="p-3 font-black text-gray-900 text-sm tracking-tight">${e.Container_No} ${photoIcon}</td><td class="p-3 font-mono text-gray-500">${e.Old_Seal}</td><td class="p-3 font-mono font-black text-blue-600 text-sm tracking-tight">${e.New_Seal}</td>`;
                tbody.appendChild(tr);
            });
        }

        window.confirmClearAll = () => document.getElementById('clearModal').classList.add('active');
        window.closeClearModal = () => document.getElementById('clearModal').classList.remove('active');
        window.clearAllData = () => { 
            clearAllRecordsFromDB(); 
            entries = []; 
            updateUI(); 
            closeClearModal(); 
            showStatus('System Wiped', 'success');
        };

        window.exportToExcel = () => {
            if (entries.length === 0) return;
            let html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><style>table{border-collapse:collapse;}th,td{border:1px solid #ccc;padding:8px;text-align:left;}th{background:#f2f2f2;}</style></head><body><table><thead><tr><th>Date</th><th>Shift</th><th>Staff ID</th><th>Container No</th><th>Old Seal</th><th>New Seal</th><th>Photo</th></tr></thead><tbody>`;
            entries.forEach(e => {
                html += `<tr><td>${e.Date}</td><td>${e.Shift}</td><td>${e.Staff_ID}</td><td>${e.Container_No}</td><td>${e.Old_Seal}</td><td>${e.New_Seal}</td><td>${e.Photo ? `<img src="${e.Photo}" width="100">` : 'N/A'}</td></tr>`;
            });
            html += `</tbody></table></body></html>`;
            const blob = new Blob([html], { type: "application/vnd.ms-excel" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Seal_Report_${new Date().toISOString().split('T')[0]}.xls`;
            a.click();
        };

        window.printReport = () => {
            const printWin = window.open('', '', 'width=900,height=600');
            let content = `<html><head><title>Seal Report</title><style>body{font-family:sans-serif;padding:20px;}table{width:100%;border-collapse:collapse;}th,td{border:1px solid #ddd;padding:10px;text-align:left;}th{background:#f4f4f4;font-size:10px;}img{max-width:120px;border-radius:4px;}</style></head><body><h2 style="text-align:center">Seal Manager Report</h2><table><thead><tr><th>Details</th><th>Container</th><th>Old Seal</th><th>New Seal</th><th>Photo</th></tr></thead><tbody>`;
            entries.forEach(e => {
                content += `<tr><td><strong>${e.Date}</strong><br>${e.Shift}</td><td>${e.Container_No}</td><td>${e.Old_Seal}</td><td>${e.New_Seal}</td><td>${e.Photo ? `<img src="${e.Photo}">` : 'N/A'}</td></tr>`;
            });
            content += `</tbody></table></body></html>`;
            printWin.document.write(content);
            printWin.document.close();
            setTimeout(() => { printWin.print(); }, 500);
        };

        window.handleShare = async () => {
            const headers = ["Date", "Shift", "Staff_ID", "Container_No", "Old_Seal", "New_Seal"];
            let csv = "\ufeff" + headers.join(",") + "\r\n";
            entries.forEach(e => { csv += headers.map(h => `"${e[h]}"`).join(",") + "\r\n"; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const file = new File([blob], `Seal_Report.csv`, { type: 'text/csv' });
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'Seal Report' });
            } else {
                window.open(`https://wa.me/?text=${encodeURIComponent('Seal Report Ready. Records: ' + entries.length)}`, '_blank');
            }
        };

        window.showStatus = (m, t) => {
            const el = document.getElementById('statusMsg');
            el.innerText = m;
            el.className = `mb-4 p-3 rounded-lg text-center text-[10px] font-black shadow-md ${t === 'success' ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        };

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('recordDate').value = today;
        
        if (localStorage.getItem('seal_app_locked') === 'false') {
            document.getElementById('lockScreen').classList.remove('active');
        }
    </script>
</body>
</html>
